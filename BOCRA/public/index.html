  const Toggle=({on,set})=>(
    <div onClick={()=>set(!on)} style={{width:44,height:24,borderRadius:99,background:on?'var(--gold-dark)':'var(--border)',cursor:'pointer',position:'relative',transition:'var(--fd)',flexShrink:0}}>
      <div style={{width:18,height:18,borderRadius:50,background:'#fff',position:'absolute',top:3,left:on?23:3,transition:'var(--fd)',boxShadow:'0 1px 4px rgba(0,0,0,.3)'}}></div>
    </div>
  );
  return (
    <div>
      <div className="ph"><div className="ph-title">Settings</div><div className="ph-sub">Manage your profile and preferences</div></div>
      <div className="grid2" style={{alignItems:'start'}}>
        <div>
          <div className="card mb4">
            <div className="chart-title" style={{marginBottom:16}}>Profile Information</div>
            <div className="flex items-c gap3 mb4">
              <Av name={user.name} size={56}/>
              <div><div className="fw7" style={{fontSize:16}}>{user.name}</div><RBadge role={user.role}/><div className="text-sm text-muted mt1">{user.email}</div></div>
            </div>
            <div className="fg"><label>Display Name</label><input value={name} onChange={e=>setName(e.target.value)}/></div>
            <div className="fg"><label>Email Address</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)}/></div>
            <div className="fg" style={{marginBottom:0}}><label>Phone Number</label><input placeholder="+267 7X XXX XXX"/></div>
          </div>
          <div className="card">
            <div className="chart-title" style={{marginBottom:16}}>Change Password</div>
            <div className="fg"><label>Current Password</label><input type="password" placeholder="••••••••"/></div>
            <div className="fg"><label>New Password</label><input type="password" placeholder="••••••••"/></div>
            <div className="fg" style={{marginBottom:0}}><label>Confirm New Password</label><input type="password" placeholder="••••••••"/></div>
          </div>
        </div>
        <div>
          <div className="card mb4">
            <div className="chart-title" style={{marginBottom:16}}>Preferences</div>
            {[
              {label:'Dark Mode',sub:'Use dark theme across the app',on:dark,set:setDark},
              {label:'Email Notifications',sub:'Receive updates via email',on:notifEmail,set:setNotifEmail},
              {label:'Push Notifications',sub:'In-app real-time alerts',on:notifPush,set:setNotifPush},
            ].map((p,i)=>(
              <div key={i} className="flex justify-b items-c" style={{padding:'12px 0',borderBottom:i<2?'1px solid var(--border)':'none'}}>
                <div><div className="fw6 text-sm">{p.label}</div><div className="text-xs text-muted">{p.sub}</div></div>
                <Toggle on={p.on} set={p.set}/>
              </div>
            ))}
          </div>
          <div className="card mb4">
            <div className="chart-title" style={{marginBottom:12}}>Account Info</div>
            {[['User ID',user.citizenId],['Role',user.role],['Account Status','Active']].map(([k,v])=>(
              <div key={k} className="kv"><span className="kv-key">{k}</span><span className="kv-val mono text-sm">{v}</span></div>
            ))}
          </div>
          <button className="btn btn-gold" style={{width:'100%',justifyContent:'center'}} onClick={save}>Save Changes</button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════ */
function App() {
  const [user, setUser] = useState(null);
  const [page, setPage] = useState('dashboard');
  const [slim, setSlim] = useState(false);
  const [mobOpen, setMobOpen] = useState(false);
  const [dark, setDark] = useState(false);
  const [toasts, setToasts] = useState([]);

  useEffect(()=>{ document.documentElement.setAttribute('data-theme',dark?'dark':''); },[dark]);

  const toast=useCallback(({msg,type='ok'})=>{
    const id=Date.now();
    setToasts(ts=>[...ts,{id,msg,type}]);
    setTimeout(()=>setToasts(ts=>ts.filter(t=>t.id!==id)),3000);
  },[]);

  const handleLogin=u=>{ setUser(u); setPage('dashboard'); };
  const handleLogout=()=>{ setUser(null); setPage('dashboard'); };
  const toggleSide=()=>{ if(window.innerWidth<=780) setMobOpen(m=>!m); else setSlim(s=>!s); };

  if(!user) return <Login onLogin={handleLogin}/>;

  const renderPage=()=>{
    switch(page){
      case 'dashboard': return <Dashboard user={user}/>;
      case 'complaints': return <Complaints user={user}/>;
      case 'licensing': return <Licensing user={user}/>;
      case 'analytics': return ['Officer','Admin'].includes(user.role)?<Analytics user={user}/>:<Dashboard user={user}/>;
      case 'activity': return ['Officer','Admin'].includes(user.role)?<ActivityFeed user={user}/>:<Dashboard user={user}/>;
      case 'users': return user.role==='Admin'?<Users user={user}/>:<Dashboard user={user}/>;
      case 'settings': return <Settings user={user} dark={dark} setDark={setDark}/>;
      default: return <Dashboard user={user}/>;
    }
  };

  return (
    <Ctx.Provider value={{ user, dark, toast }}>
      <div className="shell">
        <div className={`mobile-veil${mobOpen?' vis':''}`} onClick={()=>setMobOpen(false)}></div>
        <Sidebar user={user} page={page} setPage={p=>{setPage(p);setMobOpen(false);}} slim={slim} mobOpen={mobOpen}/>
        <div className="main">
          <Topbar user={user} page={page} onToggle={toggleSide} onLogout={handleLogout} dark={dark} setDark={setDark}/>
          <div className="content">{renderPage()}</div>
        </div>
        <Toast toasts={toasts}/>
      </div>
    </Ctx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrBoundary><App/></ErrBoundary>
);
</script>
</body>
</html>
